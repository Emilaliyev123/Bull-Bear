services:
  - type: web
    name: bull-bear-staging
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: APP_URL
        value: https://staging.bullandbear.az
      - key: PORT
        value: 10000
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: AI_USE_OPENAI
        value: "false"
      - key: DISCORD_FREE_INVITE
        value: https://discord.gg/zcXkSV34H
      - key: PAYMENT_DEFAULT_PROVIDER
        value: payriff
      - key: PAYRIFF_BASE_URL
        value: https://api.payriff.com
      - key: PAYRIFF_CREATE_PATH
        value: /api/v3/orders
      - key: PAYRIFF_ORDER_PATH
        value: /api/v3/orders/:orderId
      - key: PAYRIFF_SECRET_KEY
        sync: false
      - key: PAYRIFF_CURRENCY
        value: USD
      - key: PAYRIFF_LANGUAGE
        value: EN
