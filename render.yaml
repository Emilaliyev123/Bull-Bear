services:
  - type: web
    name: bull-bear-staging
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: APP_URL
        value: https://staging.bullandbear.az
      - key: PORT
        value: 10000
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: AI_USE_OPENAI
        value: "false"
      - key: DISCORD_FREE_INVITE
        value: https://discord.gg/zcXkSV34H
      - key: PAYMENT_DEFAULT_PROVIDER
        value: yigim
      - key: YIGIM_BASE_URL
        value: https://sandbox.api.pay.yigim.az
      - key: YIGIM_MERCHANT_ID
        sync: false
      - key: YIGIM_SECRET_KEY
        sync: false
      - key: YIGIM_BILLER_ID
        sync: false
      - key: YIGIM_TEMPLATE_ID
        value: TPL0002
      - key: YIGIM_LANGUAGE
        value: az
      - key: YIGIM_PAYMENT_TYPE
        value: SMS
      - key: YIGIM_CURRENCY
        value: "944"
      - key: YIGIM_CURRENCY_LABEL
        value: USD
