services:
  - type: web
    name: bull-bear-staging
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: bull-bear-staging-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: APP_URL
        value: https://staging.bullandbear.az
      - key: PORT
        value: 10000
      - key: STORAGE_DIR
        value: /var/data
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: AI_USE_OPENAI
        value: "false"
      - key: DISCORD_FREE_INVITE
        value: https://discord.gg/zcXkSV34H
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: DISCORD_PREMIUM_ROLE_ID
        sync: false
      - key: DISCORD_AUTO_JOIN
        value: "true"
      - key: PAYMENT_DEFAULT_PROVIDER
        value: payriff
      - key: PAYRIFF_BASE_URL
        value: https://api.payriff.com
      - key: PAYRIFF_CREATE_PATH
        value: /api/v3/orders
      - key: PAYRIFF_ORDER_PATH
        value: /api/v3/orders/:orderId
      - key: PAYRIFF_SECRET_KEY
        sync: false
      - key: PAYRIFF_CURRENCY
        value: AZN
      - key: PAYRIFF_USD_TO_AZN_RATE
        value: "1.7"
      - key: PAYRIFF_LANGUAGE
        value: EN
