name: bull-bear-staging
region: fra
services:
  - name: web
    environment_slug: node-js
    github:
      repo: Emilaliyev123/Bull-Bear
      branch: main
      deploy_on_push: true
    build_command: npm ci
    run_command: npm start
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xs
    routes:
      - path: /
    envs:
      - key: APP_URL
        value: https://staging.bullandbear.az
      - key: PORT
        value: "3000"
      - key: ADMIN_USERNAME
        value: admin
      # Configure ADMIN_PASSWORD and ADMIN_SECRET as encrypted RUN_TIME
      # environment variables in the DigitalOcean dashboard.
      - key: DISCORD_FREE_INVITE
        value: https://discord.gg/zcXkSV34H
